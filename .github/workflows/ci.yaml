# CI workflow for qubit-os-core
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install ruff mypy types-PyYAML types-protobuf
      
      - name: Ruff check
        run: ruff check src/
      
      - name: Ruff format
        run: ruff format --check src/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install mypy types-PyYAML types-protobuf types-grpcio

      - name: MyPy
        run: mypy src/qubitos/ --ignore-missing-imports

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      
      - name: Run tests
        run: pytest tests/unit/ --cov=qubitos --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.11'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # Golden file tests for reproducibility validation
  # These verify that GRAPE and QuTiP produce deterministic results
  golden:
    name: Golden File Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run golden file tests
        run: pytest tests/golden/test_golden.py -v

      - name: Verify golden files exist
        run: |
          echo "Checking for golden files..."
          ls -la tests/golden/*.json
          echo ""
          echo "Golden file checksums:"
          sha256sum tests/golden/*.json

  # Integration tests require a running HAL server.
  # Currently informational only until HAL is available in CI.
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true  # Informational - does not block PRs until Phase 3
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run integration tests (HAL-independent only)
        run: pytest tests/integration/ -v --ignore-glob="**/test_hal_*.py"

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install build tools
        run: pip install build twine
      
      - name: Build package
        run: python -m build
      
      - name: Check package
        run: twine check dist/*
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/
