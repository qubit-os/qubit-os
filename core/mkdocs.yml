# QubitOS Core Documentation
# MkDocs configuration with Material theme

site_name: QubitOS
site_description: Open-Source Quantum Control Kernel - Pulse Optimization and Hardware Abstraction
site_author: QubitOS Contributors
site_url: https://qubit-os.github.io/qubit-os/

repo_name: qubit-os/qubit-os
repo_url: https://github.com/qubit-os/qubit-os

copyright: Copyright &copy; 2026 QubitOS Contributors

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_toc_entry: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            show_if_no_docstring: false
  - mkdocs-jupyter:
      include_source: true
      execute: false  # Don't execute notebooks on build

# Hooks. txt_support lets mkdocs treat .txt files (kernel-style plain text)
# as documentation pages by transiently renaming them to .md during build
# and restoring after. See docs_hooks/txt_support.py.
hooks:
  - docs_hooks/txt_support.py

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.txt
  - Getting Started:
    - Installation: guides/installation.txt
    - Quickstart: guides/quickstart.txt
    - Troubleshooting: guides/troubleshooting.txt
  - Tutorials:
    - Pulse Generation: tutorials/pulse-generation.txt
    - GRAPE Optimizer: tutorials/grape-optimizer.txt
    - Custom Hamiltonians: tutorials/custom-hamiltonians.txt
  - API Reference:
    - Overview: api/index.txt
    - Python API:
      - Client: api/client.txt
      - Pulse Generation: api/pulsegen.txt
      - Calibration: api/calibrator.txt
      - Validation: api/validation.txt
    - CLI Reference: api/cli.txt
    - REST API: api/rest.txt
    - gRPC API: api/grpc.txt
  - Concepts:
    - Architecture: concepts/architecture.txt
    - Glossary: concepts/glossary.txt
  - Notebooks:
    - Quickstart: notebooks/01-quickstart.ipynb
    - GRAPE Optimization: notebooks/02-grape-optimization.ipynb
    - Custom Hamiltonians: notebooks/03-custom-hamiltonians.ipynb
  - Specifications:
    - Overview: specs/README.txt
    - Time Model: specs/TIME-MODEL-SPEC.txt
    - Error Budget: specs/ERROR-BUDGET-SPEC.txt
    - Hamiltonian-First API: specs/HAMILTONIAN-FIRST-API-SPEC.txt
    - Experiment Provenance: specs/EXPERIMENT-PROVENANCE-SPEC.txt
    - Multi-Qubit: specs/MULTI-QUBIT-SPEC.txt
    - Rust-Native Solver: specs/RUST-NATIVE-SOLVER-SPEC.txt
    - SME + Feedback (v0.6.0+): specs/SME-FEEDBACK-SPEC.txt

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/qubit-os
  version:
    provider: mike
