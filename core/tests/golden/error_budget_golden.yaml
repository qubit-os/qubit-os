# Golden test fixture for error budget cross-validation.
#
# This fixture defines a 10-gate, 2-qubit Bell-state-like preparation
# sequence with all error sources exercised. Expected values are computed
# analytically and serve as regression tests.
#
# Reference: ERROR-BUDGET-SPEC.md Section 12.8

description: "10-gate Bell state preparation on 2 qubits"

config:
  target_fidelity: 0.95
  coherent_fraction: 0.1

calibration:
  qubits:
    - {index: 0, t1_us: 50.0, t2_us: 30.0, readout_fidelity: 0.97}
    - {index: 1, t1_us: 45.0, t2_us: 28.0, readout_fidelity: 0.96}
  couplers:
    - {qubit_a: 0, qubit_b: 1, coupling_mhz: 5.0}

# Operations in sequence order
sequence:
  - {type: gate, qubit: 0, infidelity: 0.003, duration_ns: 20, label: "H q0"}
  - {type: gate, qubit: 1, infidelity: 0.003, duration_ns: 20, label: "X q1"}
  - {type: idle, qubit: 0, duration_ns: 10}
  - {type: gate, qubit: 0, infidelity: 0.008, duration_ns: 40, label: "CZ q0q1"}
  - {type: gate, qubit: 1, infidelity: 0.008, duration_ns: 40, label: "CZ q0q1"}
  - {type: idle, qubit: 0, duration_ns: 5}
  - {type: idle, qubit: 1, duration_ns: 5}
  - {type: gate, qubit: 0, infidelity: 0.003, duration_ns: 20, label: "Rz q0"}
  - {type: gate, qubit: 1, infidelity: 0.003, duration_ns: 20, label: "Rz q1"}
  - {type: readout, qubit: 0}
  - {type: readout, qubit: 1}
  - {type: crosstalk, qubit: 1, coupling_mhz: 5.0, duration_ns: 40}

# Analytically computed expected values
#
# Gate infidelities: q0: 0.003 + 0.008 + 0.003 = 0.014
#                    q1: 0.003 + 0.008 + 0.003 = 0.014
#                    Total gate infidelity: 0.028
#
# Coherent correction:
#   Amplitudes: sqrt(0.003) + sqrt(0.003) + sqrt(0.008) + sqrt(0.008) + sqrt(0.003) + sqrt(0.003)
#   = 2*sqrt(0.003) + 2*sqrt(0.008) + 2*sqrt(0.003)
#   = 4*sqrt(0.003) + 2*sqrt(0.008)
#   = 4*0.054772 + 2*0.089443
#   = 0.219089 + 0.178885 = 0.397975
#   Coherent = 0.1 * (0.397975)^2 = 0.1 * 0.158384 = 0.015838
#
# Per-qubit times:
#   q0: 20 + 10 + 40 + 5 + 20 = 95 ns = 0.095 us
#   q1: 20 + 40 + 5 + 20 = 85 ns = 0.085 us
#
# Decoherence:
#   q0_T1: 1 - exp(-0.095/50) = 1 - exp(-0.0019) ≈ 0.001898
#   q0_T2: 1 - exp(-0.095/30) = 1 - exp(-0.003167) ≈ 0.003162
#   q1_T1: 1 - exp(-0.085/45) = 1 - exp(-0.001889) ≈ 0.001887
#   q1_T2: 1 - exp(-0.085/28) = 1 - exp(-0.003036) ≈ 0.003031
#   Total decoherence ≈ 0.009978
#
# Readout:
#   q0: 1 - 0.97 = 0.03
#   q1: 1 - 0.96 = 0.04
#   Total readout: 0.07
#
# Crosstalk:
#   (5e6 * 40e-9)^2 = (0.2)^2 = 0.04
#
# Total projected infidelity:
#   0.028 + 0.015838 + 0.009978 + 0.07 + 0.04 = 0.163817
#
# Projected fidelity: 1 - 0.163817 = 0.836183
#
# NOT within budget (0.836 < 0.95)

expected:
  num_operations: 12
  total_gate_infidelity: 0.028
  per_qubit_time_ns:
    0: 95.0
    1: 85.0
  readout_error: 0.07
  crosstalk_error: 0.04
  is_within_budget: false
  grade: "F"
